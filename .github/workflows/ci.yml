name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      # Default features only: the `llama`/`download` backends pull a C/C++
      # toolchain + native deps and are intentionally not built in CI (see
      # docs/model.md). They are linted locally when that work is touched.
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace

  coverage:
    name: coverage (line + branch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      # Target is >= 90% line AND branch per `CLAUDE.md`. The floor below guards
      # against regressions; the remaining gap is concentrated in process-`exec`
      # and detached-daemon-spawn paths exercised by the demo/integration tests.
      # Thin binary entrypoints (daemon `main.rs`, the `src/bin/*` launchers) are
      # excluded: they are arg-dispatch shells exercised at the process level by
      # integration tests, which llvm-cov can't attribute to source lines.
      - run: cargo llvm-cov --workspace --summary-only --fail-under-lines 88 --ignore-filename-regex '(kintsugi-daemon/src/main\.rs|/src/bin/)'
      - run: cargo llvm-cov --workspace --lcov --output-path lcov.info --ignore-filename-regex '(kintsugi-daemon/src/main\.rs|/src/bin/)'
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
