name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege GITHUB_TOKEN: every job here only checks out, builds, tests,
# and uploads an artifact — none of which needs write access to the repo. The
# security-events write needed by code scanning lives in the separate CodeQL
# workflow, not here.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      # Default features only: the `llama`/`download` backends pull a C/C++
      # toolchain + native deps and are intentionally not built in CI (see
      # docs/model.md). They are linted locally when that work is touched.
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace

  coverage:
    name: coverage (line; branch tracked)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      # Honest coverage posture (see DECISIONS.md sign-off):
      #   - LINE coverage is gated here. The `--fail-under-lines` floor below is a
      #     below-target regression guard, NOT the 90% target itself — it trips if
      #     coverage slips, and is raised back toward 90 as the gaps close.
      #   - BRANCH coverage is TRACKED, NOT GATED: cargo-llvm-cov only emits branch
      #     counts on a nightly toolchain, which we don't pin in CI, so gating on it
      #     here would be misleading. It is measured locally and reviewed.
      # The remaining line gap is concentrated in code that needs a live environment
      # CI can't provide, exercised manually / by the demo:
      #   - thin binary entrypoints (daemon `main.rs`, the `src/bin/*` launchers):
      #     arg-dispatch shells, run at the process level, not line-attributable;
      #   - `kintsugi-tui/src/lib.rs`: the ratatui run-loop + terminal init/teardown,
      #     which needs a real PTY (the TUI *logic* in app.rs/ui.rs is ~90-95%);
      #   - `kintsugi-model/src/manage.rs`: GGUF model download/install (network).
      # TODO(post-0.1): add a PTY harness for the run-loop and restore toward 90.
      - run: cargo llvm-cov --workspace --summary-only --fail-under-lines 87 --ignore-filename-regex '(kintsugi-daemon/src/main\.rs|/src/bin/|kintsugi-tui/src/lib\.rs|kintsugi-model/src/manage\.rs)'
      - run: cargo llvm-cov --workspace --lcov --output-path lcov.info --ignore-filename-regex '(kintsugi-daemon/src/main\.rs|/src/bin/|kintsugi-tui/src/lib\.rs|kintsugi-model/src/manage\.rs)'
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
