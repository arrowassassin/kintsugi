name: Release

# Builds cross-platform binaries and publishes SHA256SUMS on a version tag.
# Code signing requires secrets and is a deliberate human step (see below) — this
# workflow never touches signing secrets autonomously. Use workflow_dispatch for a
# dry run that builds artifacts without publishing.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} --bins
      - name: Package + checksum
        shell: bash
        run: |
          set -euo pipefail
          dist="aegis-${{ matrix.target }}"
          mkdir -p "$dist"
          bins=(aegis aegis-daemon aegis-shim aegis-hook aegis-mcp)
          for b in "${bins[@]}"; do
            src="target/${{ matrix.target }}/release/$b"
            [ -f "$src.exe" ] && src="$src.exe"
            cp "$src" "$dist/" || true
          done
          if command -v sha256sum >/dev/null; then
            (cd "$dist" && sha256sum * > SHA256SUMS)
          else
            (cd "$dist" && shasum -a 256 * > SHA256SUMS)
          fi
          tar -czf "$dist.tar.gz" "$dist"
      - uses: actions/upload-artifact@v4
        with:
          name: aegis-${{ matrix.target }}
          path: aegis-${{ matrix.target }}.tar.gz

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Aggregate SHA256SUMS
        run: |
          set -euo pipefail
          mkdir -p out
          find artifacts -name '*.tar.gz' -exec cp {} out/ \;
          (cd out && sha256sum *.tar.gz > SHA256SUMS)
          cat out/SHA256SUMS
      # NOTE: signing the artifacts (e.g. minisign/cosign) requires a private key
      # in repository secrets and is a HUMAN checkpoint — add that step here with
      # your key before a public release.
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.tar.gz
            out/SHA256SUMS
