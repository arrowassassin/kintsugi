# CodeQL configuration for Kintsugi.
#
# Test code is excluded from analysis: unit/integration tests necessarily use
# fixed fixture passwords and salts, which the (experimental) Rust
# `hardcoded-cryptographic-value` query flags en masse. Those are not production
# secrets. The production crypto core (crates/kintsugi-core/src/admin.rs) derives
# every salt, key, and nonce from `getrandom` and is human-reviewed in
# docs/security-assessment.md (Rounds 1 and 2).
name: "Kintsugi CodeQL config"

paths-ignore:
  - "**/tests/**"
  - "**/benches/**"
  - "**/examples/**"
  - "site"
  - "scripts"
  - "docs"
