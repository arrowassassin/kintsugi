<svg xmlns="http://www.w3.org/2000/svg" width="734" height="420" viewBox="0 0 734 420" font-family="ui-monospace,DejaVu Sans Mono,Consolas,monospace">
<rect x="1" y="1" width="732" height="418" rx="8" fill="#070a11" stroke="#283557" stroke-width="3"/>
<rect x="1" y="1" width="732" height="34" rx="8" fill="#141c30"/>
<rect x="1" y="20" width="732" height="15" fill="#141c30"/>
<rect x="18" y="12" width="11" height="11" fill="#ff5d5d"/>
<rect x="36" y="12" width="11" height="11" fill="#ffd866"/>
<rect x="54" y="12" width="11" height="11" fill="#5af78e"/>
<text x="74" y="22" font-size="11" fill="#8b95ad">aegis init · status</text>
<text x="18" y="48" font-size="15" xml:space="preserve">
<tspan fill="#cdd6e6">aegis&#160;init</tspan>
</text>
<text x="18" y="68" font-size="15" xml:space="preserve">
</text>
<text x="18" y="88" font-size="15" xml:space="preserve">
<tspan fill="#cdd6e6">&#160;&#160;</tspan>
<tspan fill="#5af78e">✓</tspan>
<tspan fill="#cdd6e6">&#160;shim:&#160;linked&#160;9&#160;commands&#160;in&#160;~/.local/share/aegis/shims</tspan>
</text>
<text x="18" y="108" font-size="15" xml:space="preserve">
<tspan fill="#cdd6e6">&#160;&#160;&#160;&#160;&#160;&#160;add&#160;this&#160;to&#160;your&#160;PATH&#160;(prepend)&#160;to&#160;guard&#160;raw&#160;shell-outs:</tspan>
</text>
<text x="18" y="128" font-size="15" xml:space="preserve">
<tspan fill="#cdd6e6">&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;export&#160;PATH=&quot;~/.local/share/aegis/shims:$PATH&quot;</tspan>
</text>
<text x="18" y="148" font-size="15" xml:space="preserve">
<tspan fill="#cdd6e6">&#160;&#160;•&#160;no&#160;agent&#160;config&#160;dirs&#160;detected&#160;(~/.claude,&#160;~/.codex,&#160;~/.qwen,&#160;~/.gemini)</tspan>
</text>
<text x="18" y="168" font-size="15" xml:space="preserve">
</text>
<text x="18" y="188" font-size="15" xml:space="preserve">
<tspan fill="#cdd6e6">&#160;&#160;</tspan>
<tspan fill="#5af78e">✓</tspan>
<tspan fill="#cdd6e6">&#160;daemon&#160;started&#160;on&#160;~/run/aegis.sock</tspan>
</text>
<text x="18" y="208" font-size="15" xml:space="preserve">
</text>
<text x="18" y="228" font-size="15" xml:space="preserve">
<tspan fill="#cdd6e6">Done.&#160;Try:&#160;aegis&#160;status</tspan>
</text>
<text x="18" y="248" font-size="15" xml:space="preserve">
</text>
<text x="18" y="268" font-size="15" xml:space="preserve">
<tspan fill="#cdd6e6">$&#160;aegis&#160;status</tspan>
</text>
<text x="18" y="288" font-size="15" xml:space="preserve">
<tspan fill="#cdd6e6">aegis&#160;0.1.0</tspan>
</text>
<text x="18" y="308" font-size="15" xml:space="preserve">
<tspan fill="#cdd6e6">&#160;&#160;daemon:&#160;&#160;</tspan>
<tspan fill="#5af78e">running</tspan>
</text>
<text x="18" y="328" font-size="15" xml:space="preserve">
<tspan fill="#cdd6e6">&#160;&#160;socket:&#160;&#160;~/run/aegis.sock</tspan>
</text>
<text x="18" y="348" font-size="15" xml:space="preserve">
<tspan fill="#cdd6e6">&#160;&#160;log:&#160;&#160;&#160;&#160;&#160;~/.local/share/aegis/events.db</tspan>
</text>
<text x="18" y="368" font-size="15" xml:space="preserve">
<tspan fill="#cdd6e6">&#160;&#160;events:&#160;&#160;3</tspan>
</text>
<text x="18" y="388" font-size="15" xml:space="preserve">
<tspan fill="#cdd6e6">&#160;&#160;chain:&#160;&#160;&#160;</tspan>
<tspan fill="#5af78e">intact</tspan>
</text>
</svg>