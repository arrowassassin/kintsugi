<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Kintsugi">
  <title>Kintsugi</title>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F6DC8A"/>
      <stop offset="0.5" stop-color="#D4AF37"/>
      <stop offset="1" stop-color="#9C6F1C"/>
    </linearGradient>
    <linearGradient id="shard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A1F27"/>
      <stop offset="1" stop-color="#0A0D12"/>
    </linearGradient>
    <!-- The shard silhouette, used to fill and to clip the veins -->
    <clipPath id="cut">
      <path d="M32 3 L51 13 L55 31 L45 53 L30 61 L15 51 L9 31 L19 11 Z"/>
    </clipPath>
  </defs>

  <!-- the broken shard -->
  <path d="M32 3 L51 13 L55 31 L45 53 L30 61 L15 51 L9 31 L19 11 Z"
        fill="url(#shard)" stroke="#2A313C" stroke-width="1"/>
  <!-- a lighter rejoined piece, split along the main seam -->
  <path d="M32 3 L19 11 L9 31 L15 51 L30 61 L28 42 L34 30 L29 18 Z"
        fill="#222A34" clip-path="url(#cut)" opacity="0.7"/>

  <g clip-path="url(#cut)">
    <!-- soft glow under the gold so the seams look molten -->
    <g fill="none" stroke="#D4AF37" stroke-opacity="0.16" stroke-linecap="round" stroke-linejoin="round" stroke-width="6">
      <path d="M30 5 L29 18 L34 30 L28 42 L31 60"/>
    </g>
    <!-- primary kintsugi seam (bold, reads at favicon size) -->
    <g fill="none" stroke="url(#gold)" stroke-linecap="round" stroke-linejoin="round">
      <path d="M30 5 L29 18 L34 30 L28 42 L31 60" stroke-width="3"/>
      <!-- secondary branches -->
      <path d="M29 18 L17 15 L11 22" stroke-width="2"/>
      <path d="M29 18 L41 13" stroke-width="1.7"/>
      <path d="M34 30 L48 27 L54 33" stroke-width="2"/>
      <path d="M34 30 L22 34 L16 41" stroke-width="1.7"/>
      <path d="M28 42 L40 47 L47 53" stroke-width="1.9"/>
      <path d="M28 42 L21 49" stroke-width="1.4"/>
      <!-- fine tracery -->
      <path d="M11 22 L7 30" stroke-width="1"/>
      <path d="M48 27 L50 19" stroke-width="1"/>
      <path d="M40 47 L44 41" stroke-width="1"/>
      <path d="M22 34 L24 26" stroke-width="0.9"/>
      <!-- a thin bright sheen along the main seam -->
      <path d="M30 5 L29 18 L34 30 L28 42 L31 60" stroke="#FBEFC2" stroke-opacity="0.5" stroke-width="0.8"/>
    </g>
    <!-- gold pools where seams meet -->
    <g fill="url(#gold)">
      <circle cx="29" cy="18" r="2.3"/>
      <circle cx="34" cy="30" r="2.6"/>
      <circle cx="28" cy="42" r="2.2"/>
      <circle cx="11" cy="22" r="1.3"/>
      <circle cx="48" cy="27" r="1.3"/>
      <circle cx="40" cy="47" r="1.2"/>
    </g>
  </g>

  <!-- scattered gold dust outside the shard -->
  <g fill="#D4AF37">
    <circle cx="58" cy="20" r="0.9" opacity="0.9"/>
    <circle cx="60" cy="26" r="0.6" opacity="0.7"/>
    <circle cx="6" cy="40" r="0.8" opacity="0.85"/>
    <circle cx="9" cy="46" r="0.5" opacity="0.6"/>
    <circle cx="50" cy="58" r="0.7" opacity="0.75"/>
  </g>
</svg>
